<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>What is Direct Carrier Billing?</title>
    <script>
      ;(function redirectToSpaRoute() {
        var segmentsToKeep = 1
        var locationData = window.location
        var basePath = locationData.pathname
          .split('/')
          .slice(0, 1 + segmentsToKeep)
          .join('/')
        var routePath = locationData.pathname
          .slice(1)
          .split('/')
          .slice(segmentsToKeep)
          .join('/')

        locationData.replace(
          locationData.protocol +
            '//' +
            locationData.hostname +
            (locationData.port ? ':' + locationData.port : '') +
            basePath +
            '/?/' +
            routePath.replace(/&/g, '~and~') +
            (locationData.search
              ? '&' + locationData.search.slice(1).replace(/&/g, '~and~')
              : '') +
            locationData.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
